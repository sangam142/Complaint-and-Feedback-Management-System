<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users — CFS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar(${user})}"></div>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container">
    <h2 style="margin-bottom:1rem;">Manage Users</h2>

    <!-- Create Staff Form -->
    <div class="card">
        <div class="card-title">Create Staff / Admin Account</div>
        <form th:action="@{/admin/users/create-staff}" method="post" th:object="${newStaff}"
              style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.75rem; align-items:end;">
            <div class="form-group" style="margin:0;">
                <label>Username</label>
                <input type="text" th:field="*{username}" class="form-control" placeholder="username" required>
            </div>
            <div class="form-group" style="margin:0;">
                <label>Full Name</label>
                <input type="text" th:field="*{fullName}" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="form-group" style="margin:0;">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="email@pesu.edu" required>
            </div>
            <div class="form-group" style="margin:0;">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Min 6 chars" required>
            </div>
            <div class="form-group" style="margin:0;">
                <label>Role</label>
                <select name="role" class="form-control">
                    <option value="SUPPORT_STAFF">Support Staff</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </div>
        </form>
    </div>

    <!-- All Users -->
    <div class="card">
        <div class="card-title">All Users</div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${allUsers}">
                    <td th:text="${u.id}">1</td>
                    <td th:text="${u.username}">user</td>
                    <td th:text="${u.fullName}">Name</td>
                    <td th:text="${u.email}">email</td>
                    <td><span class="role-badge" th:text="${u.role}">ROLE</span></td>
                    <td><span th:class="'status status-' + ${u.accountStatus}" th:text="${u.accountStatus}">ACTIVE</span></td>
                    <td class="action-group">
                        <form th:if="${u.accountStatus.name() == 'ACTIVE'}"
                              th:action="@{/admin/users/{id}/status(id=${u.id})}" method="post" class="inline-form">
                            <input type="hidden" name="status" value="SUSPENDED">
                            <button type="submit" class="btn btn-sm btn-warning">Suspend</button>
                        </form>
                        <form th:if="${u.accountStatus.name() == 'SUSPENDED'}"
                              th:action="@{/admin/users/{id}/status(id=${u.id})}" method="post" class="inline-form">
                            <input type="hidden" name="status" value="ACTIVE">
                            <button type="submit" class="btn btn-sm btn-success">Reinstate</button>
                        </form>
                        <form th:if="${u.accountStatus.name() == 'ACTIVE'}"
                              th:action="@{/admin/users/{id}/status(id=${u.id})}" method="post" class="inline-form">
                            <input type="hidden" name="status" value="DEACTIVATED">
                            <button type="submit" class="btn btn-sm btn-danger">Deactivate</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
