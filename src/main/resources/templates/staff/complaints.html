<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Assignments — CFS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar(${user})}"></div>
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="container">
    <h2 style="margin-bottom:1rem;">My Assigned Complaints</h2>

    <div class="card">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Customer</th>
                    <th>Category</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Filed</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${complaints}">
                    <td th:text="${c.complaintId}" style="font-size:0.8rem;">CMP</td>
                    <td th:text="${c.title}">Title</td>
                    <td th:text="${c.customer.fullName}">Customer</td>
                    <td th:text="${c.category}" style="font-size:0.8rem;">CAT</td>
                    <td><span th:class="'priority-' + ${c.priority}" th:text="${c.priority}">MED</span></td>
                    <td><span th:class="'status status-' + ${c.status}" th:text="${c.status}">ASSIGNED</span></td>
                    <td th:text="${#temporals.format(c.createdAt, 'dd-MMM-yyyy')}">Date</td>
                    <td>
                        <a th:href="@{/staff/complaints/{id}(id=${c.id})}" class="btn btn-sm btn-primary">View</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(complaints)}">
                    <td colspan="8" style="text-align:center; color:#9ca3af; padding:2rem;">No assignments.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
