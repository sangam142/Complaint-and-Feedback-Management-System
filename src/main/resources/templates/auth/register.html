<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — CFS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" th:object="${registration}">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" th:field="*{fullName}" class="form-control"
                       placeholder="Enter full name" required>
                <small th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"
                       style="color:#dc2626; font-size:0.8rem;"></small>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" class="form-control"
                       placeholder="Choose a username" required>
                <small th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                       style="color:#dc2626; font-size:0.8rem;"></small>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control"
                       placeholder="you@example.com" required>
                <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                       style="color:#dc2626; font-size:0.8rem;"></small>
            </div>
            <div class="form-group">
                <label for="phone">Phone (Optional)</label>
                <input type="text" id="phone" th:field="*{phone}" class="form-control"
                       placeholder="Phone number">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control"
                       placeholder="Min 6 characters" required>
                <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                       style="color:#dc2626; font-size:0.8rem;"></small>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">
                Register as Customer
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</div>
</body>
</html>
