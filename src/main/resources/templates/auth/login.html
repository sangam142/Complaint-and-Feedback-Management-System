<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Complaint & Feedback System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: linear-gradient(135deg, #15803d 0%, #166534 100%); min-height: 100vh; display: flex; align-items: center; }
        .auth-container { margin: auto; }
        .auth-card { border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h2>📋 Complaint & Feedback System</h2>

        <div th:if="${param.error}" class="alert alert-danger">
            ❌ Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            ✓ You have been logged out successfully.
        </div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">👤 Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">🔐 Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">
                ➜ Login
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register"><strong>Register here</strong></a>
        </div>
    </div>
</div>
</body>
</html>
